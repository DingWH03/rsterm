# CI: Linux + Windows binaries .deb matrix + unified Release on version tags.
name: CI

on:
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  linux:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install GUI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libegl1-mesa-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libdbus-1-dev

      - name: cargo build --release
        run: cargo build --release

      - name: cargo test
        run: cargo test

      - uses: actions/upload-artifact@v4
        with:
          name: rsterm-linux-x64
          path: target/release/rsterm
          if-no-files-found: error

  windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo build --release
        run: cargo build --release

      - name: cargo test
        run: cargo test

      - uses: actions/upload-artifact@v4
        with:
          name: rsterm-windows-x64
          path: target/release/rsterm.exe
          if-no-files-found: error

  deb:
    name: deb ${{ matrix.deb_arch }}
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - deb_arch: amd64
            rust_target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: "0"
          - deb_arch: arm64
            rust_target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            use_cross: "0"
          - deb_arch: i386
            rust_target: i686-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: "1"
          - deb_arch: armhf
            rust_target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-latest
            use_cross: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install native build dependencies
        if: matrix.use_cross == '0'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libegl1-mesa-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libdbus-1-dev

      - name: Install cross
        if: matrix.use_cross == '1'
        run: cargo install cross --locked

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb
        env:
          USE_CROSS: ${{ matrix.use_cross }}
        run: |
          chmod +x packaging/build-deb.sh
          if [[ "${{ matrix.use_cross }}" == "1" ]]; then
            ./packaging/build-deb.sh "${{ matrix.rust_target }}" "${{ matrix.deb_arch }}" --cross
          else
            ./packaging/build-deb.sh "${{ matrix.rust_target }}" "${{ matrix.deb_arch }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: rsterm-deb-${{ matrix.deb_arch }}
          path: dist/*.deb
          if-no-files-found: error

  release:
    name: GitHub Release assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, windows, deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: rsterm-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
