# Build .deb packages for amd64, arm64, i386, and armhf (arm32).
name: Debian packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  deb:
    name: deb ${{ matrix.deb_arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - deb_arch: amd64
            rust_target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: "0"
          - deb_arch: arm64
            rust_target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            use_cross: "0"
          - deb_arch: i386
            rust_target: i686-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: "1"
          - deb_arch: armhf
            rust_target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-latest
            use_cross: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install native build dependencies
        if: matrix.use_cross == '0'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libegl1-mesa-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libdbus-1-dev

      - name: Install cross
        if: matrix.use_cross == '1'
        run: cargo install cross --locked

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb
        env:
          USE_CROSS: ${{ matrix.use_cross }}
        run: |
          chmod +x packaging/build-deb.sh
          if [[ "${{ matrix.use_cross }}" == "1" ]]; then
            ./packaging/build-deb.sh "${{ matrix.rust_target }}" "${{ matrix.deb_arch }}" --cross
          else
            ./packaging/build-deb.sh "${{ matrix.rust_target }}" "${{ matrix.deb_arch }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rsterm-deb-${{ matrix.deb_arch }}
          path: dist/*.deb
          if-no-files-found: error

  release-assets:
    name: Attach to GitHub Release
    needs: deb
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all debs
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: rsterm-deb-*
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
          generate_release_notes: true
