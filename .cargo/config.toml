# cargo-deb uses per-target strip when packaging. Cross-built binaries need the
# matching binutils strip on the host (see CI / binutils-*-linux-gnu packages).

[target.armv7-unknown-linux-gnueabihf]
strip = { path = "arm-linux-gnueabihf-strip" }

[target.i686-unknown-linux-gnu]
strip = { path = "i686-linux-gnu-strip" }

# Android: source packaging/android-env.sh first (sets NDK clang on PATH).
[target.aarch64-linux-android]
linker = "aarch64-linux-android34-clang"

[target.armv7-linux-androideabi]
linker = "armv7a-linux-androideabi34-clang"

[target.x86_64-linux-android]
linker = "x86_64-linux-android34-clang"

[target.i686-linux-android]
linker = "i686-linux-android34-clang"
